<html>
    <head>
        <title>Intractive Image Gallery</title>
    </head>
    <style>
        body
        {
            background:black;
            text-align: center;
        }
        .header
        {
            background:green;
            padding:15px;
            font-size:20px;
        }
        .container
        {
            display:flex;
            justify-content:center;
            align-items:center;
            height:80vh;
        }
        .card img
        {
            width:300px;
            height:250px;
            border: 4px dotted pink;
            border-radius:10px;
        }
        .caption
        {
            margin-top:10px;
            font-size:20px;
            color:red;
        }
        button
        {
            padding:8px 18px;
            margin:5px;
            border:4px solid pink;
            background:blue;
            color:black;
        }
        .footer
        {
            background:white;
            padding:10px;
            position:fixed;
            bottom:50;
            width:100%;
            font-size:20px;
        }
    </style>
    <body>
        <div class="header">
            Electronic items
        </div>
        <div class="container">
            <div class="card">
                <img id="galleryImage" src="smart watch.jpg">
                <div class="caption" id="caption">
                    Smart Watch
                </div>
                <div class="buttons">
                    <button onclick="previous()">Previous</button>
                    <button onclick="next()">Next</button>
                </div>
            </div>
            <div class="footer">
                SATHIYA PRIYAN G(25018768)
            </div>
        </div>
        <script>
            let images=[
            {src:"watch.jpeg",caption:"Smart Watch"},
            {src:"headphone.jpeg",caption:"Headset"},
            {src:"tab.jpeg",caption:"Tablet"},
            {src:"mobile.jpeg",caption:"Mobile"},
            {src:"lap.jpeg",caption:"Laptop"},
            ];
            let index=0;

            function showImage()
            {
                document.getElementById("galleryImage").src = images[index].src;
                document.getElementById("caption").innerText = images[index].caption;
            }
            function next()
            {
                index++;
                if(index >= images.length)
                {
                    index = 0;
                }
                showImage();
            }
            function previous()
            {
                index--;
                if(index < 0)
                {
                index=images.length-1;
                }
                showImage();
            }
        </script>
    </body>
</html>
